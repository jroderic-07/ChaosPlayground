{% if sandbox_active %}
<div class="mb-3 flex flex-wrap items-center justify-between gap-2">
    <div class="flex items-center gap-2">
        <span class="h-2 w-2 rounded-full bg-emerald-500"></span>
        <p class="text-xs font-medium uppercase tracking-wider text-emerald-400">Terminal Simulator</p>
    </div>
    <div class="flex items-center gap-2">
        <button
            type="button"
            id="terminal-copy-btn"
            title="Copy selection (Ctrl+Shift+C)"
            class="rounded border border-surface-border bg-surface px-2.5 py-1 text-[10px] font-medium uppercase tracking-wide text-gray-400 transition-colors hover:border-accent/30 hover:text-accent"
        >
            Copy
        </button>
        <button
            type="button"
            id="terminal-paste-btn"
            title="Paste from clipboard (Ctrl+Shift+V)"
            class="rounded border border-surface-border bg-surface px-2.5 py-1 text-[10px] font-medium uppercase tracking-wide text-gray-400 transition-colors hover:border-accent/30 hover:text-accent"
        >
            Paste
        </button>
        <span class="text-[10px] text-gray-600">Ctrl+Shift+C / V</span>
    </div>
</div>
<div class="overflow-hidden rounded border border-surface-border bg-[#0a0a0a] p-1">
    <div id="terminal" data-lab-id="{{ lab.id }}" class="h-56 w-full"></div>
</div>
{% else %}
<div class="text-center">
    <p class="text-sm text-gray-500">Terminal unavailable</p>
    <p class="mt-1 text-xs text-gray-600">Start the sandbox to enable the terminal simulator</p>
    <div class="mx-auto mt-4 h-40 max-w-lg rounded border border-dashed border-surface-border bg-black/20 opacity-60"></div>
</div>
{% endif %}
