<details class="lab-solution mt-8 rounded-md border border-surface-border bg-surface/50">
    <summary class="cursor-pointer select-none px-5 py-4 text-sm font-medium text-gray-300 transition-colors hover:text-accent">
        View Solution
    </summary>
    <div class="border-t border-surface-border px-5 py-5">
        <p class="text-xs font-medium uppercase tracking-wider text-gray-500">Post-Mortem Reasoning</p>
        <p class="mt-3 text-sm leading-relaxed text-gray-300">{{ solution.reasoning }}</p>

        <p class="mt-6 text-xs font-medium uppercase tracking-wider text-gray-500">Resolution Commands</p>
        <ol class="mt-3 space-y-2">
            {% for command in solution.commands %}
            <li>
                <pre class="overflow-x-auto rounded border border-surface-border bg-black/40 px-4 py-2.5 text-xs leading-relaxed text-emerald-300"><code>{{ command }}</code></pre>
            </li>
            {% endfor %}
        </ol>
    </div>
</details>
