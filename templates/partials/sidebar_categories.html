<nav class="sidebar-nav flex-1 overflow-y-auto overflow-x-hidden px-3 py-4">
    <p class="sidebar-text mb-3 px-2 text-xs font-medium uppercase tracking-wider text-gray-500">Lab Categories</p>
    <div class="space-y-1">
        {% for category in categories %}
        <details
            class="category-accordion group"
            {% if active_lab and active_lab.category == category.name %}open{% endif %}
        >
            <summary class="sidebar-text category-accordion__summary flex cursor-pointer list-none items-center justify-between rounded-md px-2 py-2 text-xs font-medium uppercase tracking-wider text-gray-500 transition-colors hover:bg-white/5 hover:text-gray-300">
                <span class="truncate pr-2">{{ category.name }}</span>
                <svg
                    class="category-accordion__chevron h-3.5 w-3.5 shrink-0 transition-transform duration-200 group-open:rotate-180"
                    fill="none"
                    viewBox="0 0 24 24"
                    stroke="currentColor"
                    stroke-width="2"
                >
                    <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
                </svg>
            </summary>
            <ul class="sidebar-text mt-1 space-y-1 pb-2 pl-1">
                {% for lab in category.labs %}
                <li>
                    <a
                        href="/labs/{{ lab.id }}"
                        title="{{ lab.title }}"
                        hx-get="/labs/{{ lab.id }}"
                        hx-target="#main-content"
                        hx-swap="innerHTML"
                        hx-push-url="true"
                        data-lab-id="{{ lab.id }}"
                        class="sidebar-lab-link group flex items-center justify-between rounded-md px-3 py-2 text-sm transition-colors
                            {% if active_lab and active_lab.id == lab.id %}
                                bg-accent/10 text-accent border border-accent/20
                            {% else %}
                                text-gray-400 hover:bg-white/5 hover:text-gray-200
                            {% endif %}"
                    >
                        <span class="flex min-w-0 items-center gap-2.5">
                            <span class="flex h-6 w-6 shrink-0 items-center justify-center rounded bg-surface text-[10px] font-semibold uppercase text-gray-500 group-hover:text-gray-300
                                {% if active_lab and active_lab.id == lab.id %}text-accent{% endif %}">
                                {{ lab.title[0] }}
                            </span>
                            <span class="truncate">{{ lab.title }}</span>
                        </span>
                        <span class="sidebar-detail shrink-0 pl-2">
                            {{ difficulty_badge(lab.difficulty) }}
                        </span>
                    </a>
                </li>
                {% endfor %}
            </ul>
        </details>
        {% endfor %}
    </div>
</nav>
